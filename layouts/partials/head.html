<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

<link href="{{ "pagefind/pagefind-component-ui.css" | relURL }}" rel="stylesheet">
<script src="{{ "pagefind/pagefind-component-ui.js" | relURL }}"></script>
<pagefind-config bundle-path="{{ "pagefind/" | relURL }}"></pagefind-config>

<link rel="alternate" type="application/rss+xml" href="{{ .Site.BaseURL }}index.xml" title="{{ .Site.Title }}">
